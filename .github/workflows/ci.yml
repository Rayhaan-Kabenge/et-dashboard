name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend:
    name: Engine regression + backend tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true # the reference workbook may be tracked via Git LFS

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install engine (unchanged) + backend deps
        run: |
          python -m pip install --upgrade pip
          pip install ./engine
          pip install -r backend/requirements.txt

      - name: Guard — engine package must be importable and untouched
        run: python -c "from et_engine import Config, Stage, run; print('et_engine OK')"

      - name: Warn if the regression workbook is absent
        run: |
          if [ ! -f reference/2017_2023_ETschudelr_Code.xlsm ]; then
            echo "::warning::reference/2017_2023_ETschudelr_Code.xlsm not found — engine"\
                 "regression tests will SKIP. Commit it (Git LFS) to enforce regression in CI."
          fi

      - name: Run tests (engine regression + loader + compute + API shape)
        working-directory: backend
        run: python -m pytest -q

  frontend:
    name: Frontend build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install & build
        working-directory: frontend
        run: |
          npm ci
          npm run build
